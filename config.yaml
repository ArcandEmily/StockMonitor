# ==============================================================
#  StockMonitor 配置文件
#  修改后重启程序即可生效
# ==============================================================

# --- AI 模型配置 -----------------------------------------------
ai:
  # DeepSeek API Key（必填，否则 AI 功能不可用）
  # 获取地址：https://platform.deepseek.com/
  api_key: "sk-替换为你的DeepSeekKey"

  # API 地址（兼容 OpenAI 格式，可换 GPT-4o / 本地 Ollama）
  base_url: "https://api.deepseek.com"

  # 模型名称
  # DeepSeek: deepseek-chat / deepseek-v4-pro
  # OpenAI:   gpt-4o / gpt-4o-mini
  # Ollama:   qwen2.5:7b（base_url 改为 http://localhost:11434/v1）
  model: "deepseek-chat"

  # 是否启用 AI 辅助分析（false 时仅用规则引擎，速度更快）
  enabled: true

  # 最大输出 token 数
  max_tokens: 2000

  # 输出随机性（0.0=最稳定，1.0=最发散）
  temperature: 0.2

  # 请求超时秒数
  timeout: 60

  # DeepSeek 思考模式（更准确但费用更高，默认关闭）
  thinking:
    enabled: false
    effort: "high"    # high（推荐）或 max（最贵最慢）


# --- 股票监控配置 -----------------------------------------------
stocks:
  # 监控的 A 股代码列表（可随时增删，重启生效）
  codes:
    - "000001"
    - "600519"
    - "300750"

  # 历史 K 线天数（影响支撑压力位计算精度）
  kline_days: 250

  # 自动刷新间隔（分钟），建议不低于 30
  interval_minutes: 60

  # 只在交易时段运行（留空则全天运行）
  trading_hours: ""

  # 支撑/压力位识别窗口大小
  sr_window: 10

  # 保留支撑/压力位数量
  sr_count: 3

  # 价格靠近支撑位的触发阈值（%）
  support_tolerance_pct: 2.0

  # 价格靠近压力位的触发阈值（%）
  resistance_tolerance_pct: 2.0


# --- 提醒配置 ---------------------------------------------------
alerts:
  # 强信号声音提醒（仅 Windows 有效）
  enable_sound: false
