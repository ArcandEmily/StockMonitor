<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockMonitor · 智能股票监控</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ── 配色方案（与原来完全一致，此处省略重复样式，直接复制你的原样式）── */
:root {
  --bg:          #111115;
  --bg-sidebar:  #0d0d11;
  --bg-card:     rgba(255,255,255,0.028);
  --bg-card-h:   rgba(255,255,255,0.05);
  --border:      rgba(255,255,255,0.07);
  --border-b:    rgba(255,255,255,0.13);
  --pink:        #E6397C;
  --green:       #6CA984;
  --red:         #E72D48;
  --blue:        #91CFD5;
  --amber:       #F9B800;
  --gold:        #bd832c;
  --cream:       #F5EFEA;
  --navy:        #113056;
  --t1:          #F5EFEA;
  --t2:          rgba(245,239,234,0.6);
  --t3:          rgba(245,239,234,0.32);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--t1);
  display: flex;
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar {
  width: 232px;
  flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.logo-wrap {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--pink), #c0235a);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
}
.logo-icon svg { width: 16px; height: 16px; }
.logo-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.3px;
  color: var(--t1);
}
.logo-title em { color: var(--pink); font-style: normal; }
.logo-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--t3);
  letter-spacing: 2px;
}

.section-label {
  padding: 14px 18px 6px;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--t3);
  text-transform: uppercase;
}
.stock-list { flex: 1; overflow-y: auto; padding: 4px 8px 8px; }
.s-item {
  padding: 10px 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 2px;
  border: 1px solid transparent;
  transition: background 0.12s, border-color 0.12s;
}
.s-item:hover { background: var(--bg-card-h); }
.s-item.active {
  background: rgba(230,57,124,0.07);
  border-color: rgba(230,57,124,0.25);
}
.s-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
.s-code { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--t3); }
.s-name { font-size: 13px; font-weight: 500; margin-bottom: 5px; }
.s-bot { display: flex; justify-content: space-between; align-items: center; }
.s-price { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; }
.pos { color: var(--green); }
.neg { color: var(--red); }

.badge {
  font-size: 9.5px;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.b-sb  { background: rgba(189,131,44,0.15); color: var(--gold); border: 1px solid rgba(189,131,44,0.25); }
.b-buy { background: rgba(108,169,132,0.13); color: var(--green); border: 1px solid rgba(108,169,132,0.22); }
.b-sel { background: rgba(231,45,72,0.12); color: var(--red); border: 1px solid rgba(231,45,72,0.22); }
.b-hld { background: rgba(145,207,213,0.1); color: var(--blue); border: 1px solid rgba(145,207,213,0.2); }
.b-wch { background: rgba(255,255,255,0.05); color: var(--t2); border: 1px solid var(--border-b); }

.statusbar {
  padding: 14px 18px;
  border-top: 1px solid var(--border);
}
.status-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
.s-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: breathe 3s ease-in-out infinite; }
@keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.s-run { font-size: 11px; color: var(--t3); }
.s-clock { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--t3); }

/* ── MAIN ─────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.header {
  padding: 18px 26px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-shrink: 0;
}
.h-ticker { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--t3); letter-spacing: 3px; margin-bottom: 2px; }
.h-name { font-size: 22px; font-weight: 600; margin-bottom: 5px; }
.h-price-row { display: flex; align-items: baseline; gap: 10px; }
.h-price { font-family: 'JetBrains Mono', monospace; font-size: 34px; font-weight: 500; }
.h-change { font-family: 'JetBrains Mono', monospace; font-size: 16px; }
.h-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

.decision-pill {
  padding: 7px 18px;
  border-radius: 7px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.dp-sb  { background: rgba(189,131,44,0.12); color: var(--gold);  border: 1px solid rgba(189,131,44,0.3); }
.dp-buy { background: rgba(108,169,132,0.12); color: var(--green); border: 1px solid rgba(108,169,132,0.3); }
.dp-sel { background: rgba(231,45,72,0.1);  color: var(--red);   border: 1px solid rgba(231,45,72,0.28); }
.dp-hld { background: rgba(145,207,213,0.08); color: var(--blue); border: 1px solid rgba(145,207,213,0.2); }
.dp-wch { background: rgba(255,255,255,0.04); color: var(--t2);  border: 1px solid var(--border-b); }

.rule-row { display: flex; align-items: center; gap: 8px; }
.rule-label { font-size: 10px; color: var(--t3); }
.h-update { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--t3); }

/* ── CONTENT ─────────────────────────────────────────────── */
.content { flex: 1; overflow-y: auto; padding: 18px 26px; display: flex; flex-direction: column; gap: 14px; }

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}
.card-title {
  font-size: 9.5px;
  letter-spacing: 2px;
  color: var(--t3);
  text-transform: uppercase;
  margin-bottom: 14px;
}

/* Charts row */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.chart-wrap { position: relative; height: 155px; }

/* Custom chart legend */
.chart-legend { display: flex; gap: 14px; margin-bottom: 10px; }
.cl-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--t3); }
.cl-line { width: 16px; height: 2px; border-radius: 1px; }
.cl-dash { width: 16px; height: 0; border-top: 1.5px dashed; }

/* Indicators grid */
.ind-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
.m-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 12px;
}
.m-lbl { font-size: 9px; color: var(--t3); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 5px; }
.m-val { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500; }
.m-sub { font-size: 9.5px; color: var(--t3); margin-top: 3px; }
.c-pos { color: var(--green); }
.c-neg { color: var(--red); }
.c-neu { color: var(--blue); }
.c-wrn { color: var(--amber); }
.c-acc { color: var(--pink); }
.c-gld { color: var(--gold); }

/* Bottom row */
.bot-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* S/R panel */
.sr-item { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 11.5px; }
.sr-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sr-bar { flex: 1; height: 1px; }
.sr-pct { font-size: 10px; min-width: 42px; text-align: right; }
.sr-price { font-family: 'JetBrains Mono', monospace; font-size: 12px; min-width: 68px; text-align: right; }
.sr-sep { font-size: 9px; color: var(--t3); letter-spacing: 1.5px; margin: 10px 0 7px; }

/* AI panel */
.ai-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 13px; }
.ai-pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--pink); animation: breathe 2s ease-in-out infinite; }
.ai-lbl { font-size: 9.5px; color: var(--t3); letter-spacing: 2px; text-transform: uppercase; }
.ai-conf {
  margin-left: auto;
  font-size: 9.5px;
  padding: 2px 9px;
  background: rgba(230,57,124,0.09);
  color: var(--pink);
  border: 1px solid rgba(230,57,124,0.2);
  border-radius: 3px;
}
.ai-dec { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
.ai-summ {
  font-size: 11.5px;
  color: var(--t2);
  line-height: 1.65;
  padding: 10px 12px;
  background: rgba(230,57,124,0.04);
  border-left: 2px solid rgba(230,57,124,0.5);
  border-radius: 0 6px 6px 0;
  margin-bottom: 12px;
}
.ai-list { list-style: none; }
.ai-list li {
  display: flex; gap: 7px;
  font-size: 11px; color: var(--t2);
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
}
.ai-list li:last-child { border-bottom: none; }
.ai-dot { color: var(--pink); flex-shrink: 0; }
.targets { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 13px; }
.t-item { background: rgba(255,255,255,0.025); border-radius: 6px; padding: 8px 10px; text-align: center; border: 1px solid var(--border); }
.t-lbl { font-size: 9px; color: var(--t3); letter-spacing: 1px; text-transform: uppercase; }
.t-val { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; margin-top: 4px; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo-wrap">
    <div class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="1,12 4,7 7,9 10,4 13,6 15,2" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="15" cy="2" r="1.2" fill="white"/>
        </svg>
      </div>
      <div class="logo-title">Stock<em>Monitor</em></div>
    </div>
    <div class="logo-sub">AI 辅助决策系统 v1.0</div>
  </div>
  <div class="section-label">监控列表</div>
  <div class="stock-list" id="stockList"></div>
  <div class="statusbar">
    <div class="status-row">
      <div class="s-dot"></div>
      <span class="s-run" id="statusText">运行中 · 加载数据...</span>
    </div>
    <div class="s-clock" id="clock"></div>
  </div>
</aside>

<main class="main">
  <div class="header" id="hdr"></div>
  <div class="content">
    <div class="charts-row">
      <div class="card">
        <div class="card-title">MACD · DIF / DEA / 柱线</div>
        <div class="chart-legend">
          <div class="cl-item"><div class="cl-line" style="background:var(--pink)"></div>DIF</div>
          <div class="cl-item"><div class="cl-dash" style="border-color:var(--blue)"></div>DEA</div>
          <div class="cl-item"><div class="cl-line" style="background:var(--green);height:8px;border-radius:2px;width:10px"></div>柱·正</div>
          <div class="cl-item"><div class="cl-line" style="background:var(--red);height:8px;border-radius:2px;width:10px"></div>柱·负</div>
        </div>
        <div class="chart-wrap"><canvas id="macdChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">价格 · 布林带（20/2）</div>
        <div class="chart-legend">
          <div class="cl-item"><div class="cl-line" style="background:var(--cream)"></div>收盘价</div>
          <div class="cl-item"><div class="cl-dash" style="border-color:var(--red);opacity:0.6"></div>上轨</div>
          <div class="cl-item"><div class="cl-dash" style="border-color:var(--blue);opacity:0.6"></div>中轨</div>
          <div class="cl-item"><div class="cl-dash" style="border-color:var(--green);opacity:0.6"></div>下轨</div>
        </div>
        <div class="chart-wrap"><canvas id="bbChart"></canvas></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">技术指标概览</div>
      <div class="ind-grid" id="indGrid"></div>
    </div>

    <div class="bot-row">
      <div class="card">
        <div class="card-title">支撑位 / 压力位分析</div>
        <div id="srPanel"></div>
      </div>
      <div class="card">
        <div class="ai-hdr">
          <div class="ai-pulse"></div>
          <span class="ai-lbl">DeepSeek AI 分析</span>
          <span class="ai-conf" id="aiConf">置信度：--</span>
        </div>
        <div id="aiPanel"></div>
      </div>
    </div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════════════
// 动态后端 API 调用版 – 替换原有静态数据
// ═══════════════════════════════════════════════════════════════

let currentStocks = [];        // 存储股票列表 {code, name, price, ...}
let selectedCode = null;       // 当前选中的股票代码
let chartMACD = null, chartBB = null;

// 辅助函数
function badgeCls(d) {
  if(d.includes('强烈买入')) return 'b-sb';
  if(d.includes('买入'))    return 'b-buy';
  if(d.includes('卖出')||d.includes('减仓')) return 'b-sel';
  if(d.includes('持有'))    return 'b-hld';
  return 'b-wch';
}
function pillCls(d) {
  if(d.includes('强烈买入')) return 'dp-sb';
  if(d.includes('买入'))    return 'dp-buy';
  if(d.includes('卖出')||d.includes('减仓')) return 'dp-sel';
  if(d.includes('持有'))    return 'dp-hld';
  return 'dp-wch';
}
function spark(data, pos) {
  const w=62, h=26, p=3;
  const mn=Math.min(...data), mx=Math.max(...data), rng=mx-mn||1;
  const pts=data.map((v,i)=>{
    const x=p+(i/(data.length-1))*(w-2*p);
    const y=p+(1-(v-mn)/rng)*(h-2*p);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const c=pos?'#6CA984':'#E72D48';
  return `<svg width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

// 从后端获取股票列表并渲染侧边栏
async function loadStockList() {
  try {
    const resp = await fetch('/api/stocks');
    const data = await resp.json();
    if (data.ok) {
      currentStocks = data.stocks;
      renderSidebar();
      // 自动选中第一只非 loading 的股票
      const firstValid = currentStocks.find(s => !s.loading);
      if (firstValid && firstValid.code !== selectedCode) {
        selectStock(firstValid.code);
      }
      document.getElementById('statusText').innerText = `运行中 · ${currentStocks.length} 只股票`;
    } else {
      console.error('获取股票列表失败', data);
    }
  } catch (err) {
    console.error('请求失败', err);
  }
}

function renderSidebar() {
  const container = document.getElementById('stockList');
  if (!container) return;
  container.innerHTML = currentStocks.map(s => `
    <div class="s-item ${selectedCode === s.code ? 'active' : ''}" onclick="selectStock('${s.code}')">
      <div class="s-top">
        <span class="s-code">${s.code}</span>
        <span class="badge ${badgeCls(s.decision || '观望')}">${(s.decision || '观望').replace('（信号一般）','').replace('倾向','')}</span>
      </div>
      <div class="s-name">${s.name || s.code}</div>
      <div class="s-bot">
        <span class="s-price ${s.change>=0?'pos':'neg'}">${(s.price || 0).toFixed(2)}</span>
        ${s.priceD ? spark(s.priceD, s.change>=0) : ''}
      </div>
    </div>
  `).join('');
}

// 选中某只股票，拉取完整数据并刷新视图
async function selectStock(code) {
  selectedCode = code;
  renderSidebar();  // 高亮更新
  try {
    const resp = await fetch(`/api/stock/${code}`);
    const data = await resp.json();
    if (data.ok) {
      const s = data.stock;
      renderHeader(s);
      renderIndicators(s);
      renderSR(s);
      renderAI(s);
      renderCharts(s);
      // 更新该股票在列表中的基础信息（价格等）
      const idx = currentStocks.findIndex(st => st.code === code);
      if (idx !== -1) {
        currentStocks[idx].price = s.price;
        currentStocks[idx].change = s.change;
        currentStocks[idx].decision = s.decision;
        currentStocks[idx].priceD = s.priceD;
        renderSidebar(); // 刷新侧边栏价格
      }
    } else {
      console.error('加载股票详情失败', data);
    }
  } catch (err) {
    console.error('请求详情失败', err);
  }
}

// 刷新单只股票（手动）
async function refreshStock(code) {
  if (!code) return;
  try {
    const resp = await fetch('/api/stock/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await resp.json();
    if (data.ok) {
      // 显示“刷新中”提示
      const statusSpan = document.getElementById('statusText');
      const oldText = statusSpan.innerText;
      statusSpan.innerText = `刷新 ${code} 中...`;
      // 等待 2 秒后重新加载该股票详情（给后端一些处理时间）
      setTimeout(async () => {
        await selectStock(code);
        statusSpan.innerText = oldText;
      }, 2000);
    } else {
      alert(data.error || '刷新失败');
    }
  } catch (err) {
    console.error(err);
  }
}

// 添加新股票
async function addStock() {
  let code = prompt('请输入股票代码（如 600519）');
  if (!code) return;
  code = code.trim();
  try {
    const resp = await fetch('/api/stock/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await resp.json();
    if (data.ok) {
      alert(`已添加 ${code}，正在加载数据...`);
      await loadStockList();
      // 自动选中新添加的股票
      setTimeout(() => selectStock(code), 1500);
    } else {
      alert(data.error || '添加失败');
    }
  } catch (err) {
    console.error(err);
  }
}

// 删除股票
async function removeStock(code) {
  if (!confirm(`确定从监控列表中删除 ${code} 吗？`)) return;
  try {
    const resp = await fetch('/api/stock/remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await resp.json();
    if (data.ok) {
      await loadStockList();
      if (currentStocks.length > 0) {
        selectStock(currentStocks[0].code);
      }
    } else {
      alert(data.error || '删除失败');
    }
  } catch (err) {
    console.error(err);
  }
}

// 以下 render 函数与原来类似，但使用动态传入的 stock 对象
function renderHeader(s) {
  const sign = s.change >= 0 ? '+' : '';
  const pct = s.price !== s.change ? ((s.change / (s.price - s.change)) * 100).toFixed(2) : '0.00';
  document.getElementById('hdr').innerHTML = `
    <div>
      <div class="h-ticker">${s.code} · SZSE/SSE · A股</div>
      <div class="h-name">${s.name}</div>
      <div class="h-price-row">
        <span class="h-price">${s.price.toFixed(2)}</span>
        <span class="h-change ${s.change>=0?'pos':'neg'}">${sign}${s.change.toFixed(2)} (${sign}${pct}%)</span>
      </div>
    </div>
    <div class="h-right">
      <div class="decision-pill ${pillCls(s.decision)}">${s.decision}</div>
      <div class="rule-row">
        <span class="rule-label">规则引擎</span>
        <span class="badge ${badgeCls(s.rule)}">${s.rule}</span>
      </div>
      <div class="h-update" id="hupd">最后更新：${s.updatedAt ? new Date(s.updatedAt).toLocaleTimeString() : '--:--:--'}</div>
      <div style="margin-top: 6px;">
        <button onclick="refreshStock('${s.code}')" style="background:rgba(230,57,124,0.2); border:1px solid var(--pink); color:var(--pink); padding:4px 10px; border-radius:4px; cursor:pointer; font-size:11px;">⟳ 刷新</button>
        <button onclick="removeStock('${s.code}')" style="background:rgba(231,45,72,0.1); border:1px solid var(--red); color:var(--red); padding:4px 10px; border-radius:4px; cursor:pointer; font-size:11px; margin-left:6px;">✕ 删除</button>
      </div>
    </div>
  `;
}

function renderIndicators(s) {
  const macdX = s.dif > s.dea ? '金叉' : '死叉';
  const macdZ = s.dif > 0 ? '零轴↑' : '零轴↓';
  const bbPos = s.bbPct < 0.25 ? '接近下轨' : (s.bbPct > 0.8 ? '接近上轨' : '轨道中部');
  const volT = s.vr > 1.5 ? '放量' : (s.vr < 0.7 ? '缩量' : '正常');
  const mc = (c) => ({pos:'c-pos', neg:'c-neg', neu:'c-neu', wrn:'c-wrn', acc:'c-acc', gld:'c-gld'}[c] || '');
  const metrics = [
    {l:'DIF',     v:s.dif.toFixed(4), s:macdZ,   c:s.dif>0?'pos':'neg'},
    {l:'DEA',     v:s.dea.toFixed(4), s:macdX,   c:s.dif>s.dea?'pos':'neg'},
    {l:'MACD柱',  v:(s.hist>=0?'+':'')+s.hist.toFixed(4), s:s.hist>0?'红柱':'绿柱', c:s.hist>0?'pos':'neg'},
    {l:'RSI 14',  v:s.rsi.toFixed(1), s:s.rsi<30?'超卖':s.rsi>70?'超买':'正常', c:s.rsi<30?'pos':s.rsi>70?'neg':'neu'},
    {l:'布林位置', v:(s.bbPct*100).toFixed(0)+'%', s:bbPos, c:s.bbPct<0.3?'pos':s.bbPct>0.8?'neg':'neu'},
    {l:'布林带宽', v:s.bbW.toFixed(2)+'%', s:'波动指数', c:'neu'},
    {l:'量比',    v:s.vr.toFixed(2), s:volT, c:s.vr>1.5?'wrn':'neu'},
    {l:'换手率',  v:s.tr.toFixed(2)+'%', s:'今日换手', c:'neu'},
    {l:'MA 5',   v:s.ma5.toFixed(2), s:s.price>s.ma5?'价格在上↑':'价格在下↓', c:s.price>s.ma5?'pos':'neg'},
    {l:'MA 10',  v:s.ma10.toFixed(2), s:s.price>s.ma10?'价格在上↑':'价格在下↓', c:s.price>s.ma10?'pos':'neg'},
    {l:'MA 20',  v:s.ma20.toFixed(2), s:'中期趋势', c:'neu'},
    {l:'MA 60',  v:s.ma60.toFixed(2), s:'长期趋势', c:'neu'},
  ];
  document.getElementById('indGrid').innerHTML = metrics.map(m => `
    <div class="m-card">
      <div class="m-lbl">${m.l}</div>
      <div class="m-val ${mc(m.c)}">${m.v}</div>
      <div class="m-sub">${m.s}</div>
    </div>
  `).join('');
}

function renderSR(s) {
  let h = '';
  h += `<div class="sr-sep">▲ 压力位</div>`;
  [...s.ress].reverse().forEach(r => {
    const pct = ((r - s.price) / s.price * 100).toFixed(1);
    const a = (r === Math.min(...s.ress)) ? 1 : 0.5;
    h += `<div class="sr-item">
      <div class="sr-dot" style="background:var(--red);opacity:${a}"></div>
      <div class="sr-bar" style="background:rgba(231,45,72,${a*0.18})"></div>
      <span class="sr-pct" style="color:var(--red)">+${pct}%</span>
      <span class="sr-price" style="color:var(--red)">${r.toFixed(2)}</span>
    </div>`;
  });
  h += `<div class="sr-item" style="margin:10px 0">
    <div style="width:8px;height:8px;border-radius:2px;background:var(--pink);flex-shrink:0"></div>
    <div class="sr-bar" style="background:rgba(230,57,124,0.25)"></div>
    <span class="sr-pct" style="color:var(--pink);font-weight:600">当前</span>
    <span class="sr-price" style="color:var(--pink);font-weight:600">${s.price.toFixed(2)}</span>
  </div>`;
  h += `<div class="sr-sep">▼ 支撑位</div>`;
  [...s.sups].reverse().forEach(sup => {
    const pct = ((s.price - sup) / s.price * 100).toFixed(1);
    const a = (sup === Math.max(...s.sups)) ? 1 : 0.5;
    h += `<div class="sr-item">
      <div class="sr-dot" style="background:var(--green);opacity:${a}"></div>
      <div class="sr-bar" style="background:rgba(108,169,132,${a*0.18})"></div>
      <span class="sr-pct" style="color:var(--green)">-${pct}%</span>
      <span class="sr-price" style="color:var(--green)">${sup.toFixed(2)}</span>
    </div>`;
  });
  document.getElementById('srPanel').innerHTML = h;
}

function renderAI(s) {
  document.getElementById('aiConf').textContent = `置信度：${s.aiConf || '低'}`;
  const dc = s.aiDecision.includes('强烈买入') ? 'c-gld' : (s.aiDecision.includes('买入') ? 'c-pos' : (s.aiDecision.includes('卖出') ? 'c-neg' : 'c-neu'));
  let html = `<div class="ai-dec ${dc}">${s.aiDecision}</div>
    <div class="ai-summ">${s.aiSum || '暂无AI分析结果'}</div>
    <ul class="ai-list">${(s.aiR || []).map(r => `<li><span class="ai-dot">·</span>${r}</li>`).join('')}</ul>`;
  if (s.aiE || s.aiS || s.aiTShort || s.aiTLong) {
    html += `<div class="targets">
      <div class="t-item"><div class="t-lbl">建议入场</div><div class="t-val c-pos">${s.aiE ? s.aiE.toFixed(2) : '—'}</div></div>
      <div class="t-item"><div class="t-lbl">止损位</div><div class="t-val c-neg">${s.aiS ? s.aiS.toFixed(2) : '—'}</div></div>
      <div class="t-item"><div class="t-lbl">短期目标</div><div class="t-val c-gld">${s.aiTShort ? s.aiTShort.toFixed(2) : '—'}</div></div>
      <div class="t-item"><div class="t-lbl">长期目标</div><div class="t-val c-acc">${s.aiTLong ? s.aiTLong.toFixed(2) : '—'}</div></div>
    </div>`;
  }
  document.getElementById('aiPanel').innerHTML = html;
}

function renderCharts(s) {
  if (chartMACD) chartMACD.destroy();
  if (chartBB) chartBB.destroy();

  const histData = s.macdD.map((d,i) => d - s.deaD[i]);
  const hColors = histData.map(v => v>=0 ? 'rgba(108,169,132,0.75)' : 'rgba(231,45,72,0.75)');

  chartMACD = new Chart(document.getElementById('macdChart'), {
    type: 'bar',
    data: {
      labels: s.lbls,
      datasets: [
        { label:'MACD柱', data:histData, backgroundColor:hColors, order:2 },
        { label:'DIF', data:s.macdD, type:'line', borderColor:'#E6397C', borderWidth:1.8, pointRadius:0, tension:0.4, order:1 },
        { label:'DEA', data:s.deaD, type:'line', borderColor:'#91CFD5', borderWidth:1.5, pointRadius:0, tension:0.4, borderDash:[5,4], order:1 },
      ],
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ ticks:{ color:'rgba(245,239,234,0.28)' } }, y:{ ticks:{ color:'rgba(245,239,234,0.28)' } } } }
  });

  const bbUArr = s.priceD.map(()=>s.bbU);
  const bbMArr = s.priceD.map(()=>s.bbM);
  const bbLArr = s.priceD.map(()=>s.bbL);

  chartBB = new Chart(document.getElementById('bbChart'), {
    data: {
      labels: s.lbls,
      datasets: [
        { label:'布林上轨', data:bbUArr, type:'line', borderColor:'rgba(231,45,72,0.45)', borderWidth:1, borderDash:[4,3], pointRadius:0, fill:false },
        { label:'中轨', data:bbMArr, type:'line', borderColor:'rgba(145,207,213,0.5)', borderWidth:1, borderDash:[6,4], pointRadius:0, fill:false },
        { label:'布林下轨', data:bbLArr, type:'line', borderColor:'rgba(108,169,132,0.45)', borderWidth:1, borderDash:[4,3], pointRadius:0, fill:false },
        { label:'价格', data:s.priceD, type:'line', borderColor:'#F5EFEA', borderWidth:2, pointRadius:2, pointBackgroundColor:'#E6397C', tension:0.3, fill:false },
      ],
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ ticks:{ color:'rgba(245,239,234,0.28)' } }, y:{ ticks:{ color:'rgba(245,239,234,0.28)' } } } }
  });
}

// 时钟更新
function tick() {
  const now = new Date();
  const t = now.toLocaleTimeString('zh-CN');
  const d = now.toLocaleDateString('zh-CN', {month:'2-digit', day:'2-digit'});
  const cl = document.getElementById('clock');
  const hu = document.getElementById('hupd');
  if (cl) cl.textContent = `${d} ${t}`;
  if (hu && selectedCode) {
    // 可选：更新时间戳
  }
}

loadStockList();
setInterval(tick, 1000);
tick();
